name: fresh
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase dependencies for Web/Mobile
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.2
  firebase_storage: ^12.2.0

  flutter_tts: ^3.5.2

  tflite_flutter: ^0.11.0 # For TFLite model inference
  image_picker: ^1.1.2     # For picking images from gallery/camera
  image: ^4.2.0
  camera: ^0.11.0+2
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/medicinal_Plants_data.json
    - assets/ml_model/model_unquant.tflite # New!
    - assets/ml_model/labels.txt           # New!
    - assets/icon/app_icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 # optional
flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/app_icon.png   # your logo path
  android_12:
    image: assets/icon/app_icon.png
    color: "#ffffff"

